name: Deploy Backend

on:
  push:
    branches: [ main ] # 메인 브랜치에 코드가 푸시될 때 실행됩니다.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. 백엔드 프로젝트 폴더로 이동
            mkdir -p ~/reviewApp-backend
            cd ~/reviewApp-backend
            
            # 2. 최신 소스 코드 가져오기
            git fetch --all
            git reset --hard origin/main
            
            # 2.1 해당 폴더로 이동
            cd review-backend

            # 3. 패키지 설치 (repository 최상위에 package.json이 있으므로 바로 실행)
            npm install
            
            # 4. Prisma 클라이언트 생성 (데이터베이스 연동 업데이트)
            npx prisma generate
            
            # 5. 기존 구동 중인 백엔드 프로세스 중지
            pm2 delete backend-app || true
            
            # 6. 백엔드 서버 시작 (포트 5050을 사용하도록 설정)
            # 서버 환경에 따라 npm run start(빌드 후 실행)로 수정하시는 것을 권장합니다.
            pm2 start npm --name "backend-app" -- run dev
            
            # 7. 재부팅 시에도 PM2 서비스가 유지되도록 저장
            pm2 save
            
            # 8. PM2 프로세스 상태 출력
            pm2 list
