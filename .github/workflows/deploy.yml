name: Deploy Backend

on:
  push:
    branches: [ main ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 코드를 깃허브 공장으로 가져오기 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 깃허브 공장에 Node.js 24버전 설치
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. 깃허브 공장에서 의존성 설치 및 백엔드 초고속 압축(esbuild)
        run: |
          npm install
          npx prisma generate
          npm run build

      - name: 4. 핵심 구동 파일만 내 서버로 배달 (SCP 전송)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist,package.json,prisma"
          target: "~/reviewApp-backend"

      - name: 5. 내 서버에 접속해서 PM2 켜기 (초경량 작업)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/reviewApp-backend
            
            # 무거운 devDependencies(타입스크립트 등)를 제외한 실 구동용 패키지만 빠르게 설치
            npm install --omit=dev
            
            # 리눅스 OS(iwinv)에 맞는 Prisma DB 엔진 바이너리 생성
            npx prisma generate
            
            # 기존 고스트 프로세스 삭제
            pm2 delete backend-app || true
            
            # tsx watch 대신, 엄청 가벼워진 node 구동 명령어로 서비스 시작
            pm2 start npm --name "backend-app" -- run start
            
            pm2 save
            pm2 list
