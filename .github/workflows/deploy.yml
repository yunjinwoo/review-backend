name: Deploy Backend

on:
  push:
    branches: [ main ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 코드를 깃허브 공장으로 가져오기 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 깃허브 공장에 Node.js 24버전 설치
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. 깃허브 공장에서 빌드만 수행 (패키징 안 함)
        run: |
          npm install
          npx prisma generate
          npm run build

      - name: 4. 필수 파일(코드 파일)만 내 서버로 초고속 배달
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist,package.json,package-lock.json,prisma"
          target: "~/reviewApp-backend"

      - name: 5. 내 서버에 접속해서 초경량 모듈 설치 및 PM2 켜기
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/reviewApp-backend
            
            # `npm install` 대신 `npm ci`를 사용합니다. (매우 중요)
            # 트리를 재계산하지 않고 package-lock.json을 보고 다운로드만 하므로 메모리(RAM)를 획기적으로 적게 씁니다!
            npm ci --omit=dev
            
            # 서버용 Prisma 엔진 생성
            npx prisma generate
            
            # 기존 고스트 프로세스 삭제
            pm2 delete backend-app || true
            
            # 바로 서비스 시작
            pm2 start npm --name "backend-app" -- run start
            
            pm2 save
            pm2 list
