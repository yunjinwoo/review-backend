name: Deploy Backend

on:
  push:
    branches: [ main ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 서버 접속 및 Git Pull 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          # 서버 설치 및 빌드 시간을 고려해 30분 타임아웃 유지
          command_timeout: 30m
          script: |
            export CI=true
            
            # 1. 프로젝트 폴더로 이동
            cd ~/reviewApp-backend
            
            # 2. 최신 코드를 깃허브에서 직접 당겨오기 (Pull)
            # ※ 주의: 서버에 미리 git clone이 되어 있고, SSH Key 권한이 있어야 합니다.
            git pull origin main
            
            # 3. 의존성 설치 및 생성
            npm install --no-audit --no-fund
            npx --yes prisma generate
            
            # 4. 서버 현지 빌드 수행
            npm run build
            
            # 5. PM2 앱 재시작
            pm2 delete backend-app || true
            pm2 start dist/server.js --name "backend-app"
            
            pm2 save
            pm2 list
