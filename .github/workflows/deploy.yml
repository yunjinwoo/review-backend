name: Deploy Backend

on:
  push:
    branches: [ main ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 코드를 깃허브 공장으로 가져오기 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 깃허브 공장에 Node.js 24버전 설치
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. 깃허브 공장에서 빌드 및 배포 패키지 압축(메모리 부족 방지)
        run: |
          # 1. 통상적인 설치 및 빌드
          npm install
          npx prisma generate
          npm run build
          
          # 2. 프로덕션 환경에 불필요한 패키지(dev) 제거하여 용량 다이어트
          npm prune --omit=dev
          
          # 3. 필요한 파일들만 하나로 압축 (단일 파일 전송이 SCP 속도/자원 소모 측면에서 압도적으로 유리)
          tar -czf deploy.tar.gz dist node_modules package.json prisma

      - name: 4. 단일 배포 패키지 서버로 배달 (SCP 고속 전송)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "~/reviewApp-backend"

      - name: 5. 내 서버에 접속해서 압축 풀고 PM2 켜기 (초경량 작업)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/reviewApp-backend
            
            # 엄청 가벼운 압축 해제 작업 (메모리 1/10도 안 씀)
            tar -xzf deploy.tar.gz
            
            # 기존 고스트 프로세스 삭제
            pm2 delete backend-app || true
            
            # 서버 단에서는 더 이상 npm install이나 npx prisma generate를 하지 않음!
            # 바로 서비스 시작
            pm2 start npm --name "backend-app" -- run start
            
            pm2 save
            pm2 list
