name: Deploy Backend

on:
  push:
    branches: [ main ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 1. 코드를 깃허브 공장으로 가져오기 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 깃허브 공장에 Node.js 24버전 설치
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. 깃허브 공장에서 무거운 모듈 설치 및 빌드 전부 수행
        run: |
          # 깃허브의 강력한 CPU/RAM을 써서 무거운 설치를 여기서 다 끝냅니다.
          npm ci --omit=dev
          npx prisma generate
          npm run build
          
          # 만들어진 결과물과 무거운 node_modules까지 전부 하나의 파일로 압축합니다!
          tar -czvf backend-deploy.tar.gz dist node_modules package.json package-lock.json prisma

      - name: 4. 내 서버로 압축 완료된 단 1개의 파일만 초고속 배달
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend-deploy.tar.gz"
          target: "~/"

      - name: 5. 내 서버 접속 후 압축 풀고 PM2만 바로 켜기 (초경량 작업)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 기존 폴더로 이동 및 없으면 생성
            mkdir -p ~/reviewApp-backend
            
            # 방금 배달온 압축 파일을 서버 폴더에 풀기
            tar -xzvf ~/backend-deploy.tar.gz -C ~/reviewApp-backend
            
            cd ~/reviewApp-backend
            
            # 고스트 프로세스 삭제 후 바로 실행 (npm install 전혀 안 함!)
            pm2 delete backend-app || true
            pm2 start npm --name "backend-app" -- run start
            
            pm2 save
            pm2 list
            
            # 남은 압축 파일 청소
            rm ~/backend-deploy.tar.gz
